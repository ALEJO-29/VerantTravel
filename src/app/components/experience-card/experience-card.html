<article class="experience-card" [attr.data-category]="experience.category">
    <div class="card-image">
        <img [src]="experience.image" [alt]="experience.title">
        <div class="card-badge" *ngIf="experience.badge">{{experience.badge}}</div>
        <button
            class="card-favorite-btn"
            [class.is-favorite]="isFavorite"
            (click)="onFavoriteClick($event)"
            [attr.aria-label]="isFavorite ? 'Quitar de favoritos' : 'Guardar en favoritos'"
        >
            <span class="material-symbols-outlined">favorite</span>
        </button>
    </div>
    <div class="card-content">
        <div class="card-header">
            <h3>{{experience.title}}</h3>
            <span class="card-price">{{experience.price}}</span>
        </div>
        <p class="card-description">{{experience.description}}</p>
        <div class="card-footer">
            <span class="card-duration">{{experience.duration}}</span>
            <a [routerLink]="['/detail', experience.id]" class="btn-details">
                Ver detalles <span class="material-symbols-outlined">arrow_forward</span>
            </a>
        </div>
    </div>
</article>
